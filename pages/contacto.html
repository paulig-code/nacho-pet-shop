<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Nacho Pet Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <header>
        <div class="div-logo">
            <a href="../index.html" class="logo">
                <img src="../img/logo.png" alt="Nacho Pet Shop">
            </a>
        </div>
        <nav class="header-nav">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="titulo-contacto text-secondary">Contactanos</h1>

        <form class="form-contacto" action="https://formspree.io/f/xjglpdbr" method="POST">

            <div class="grupo-input">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo">
            </div>

            <div class="grupo-input">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@mail.com">
            </div>

            <div class="grupo-input">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribí tu consulta acá"></textarea>
            </div>

            <button type="submit" class="btn bg-secondary text-dark">Enviar</button>

        </form>
    </main>

    <footer>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="./contacto.html">Contacto</a></li>
            <li><a href="#">
                <img src="../img/whatsapp.png" alt="Logo WhatsApp">
            </a></li>
            <li><a href="#">
                <img src="../img/instagram.png" alt="Logo Instagram">
            </a></li>
        </ul>
        <p>© 2026 Nacho Pet Shop</p>
    </footer>

</body>
</html>
